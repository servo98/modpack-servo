# ==========================================================================
# Capitulo 5: Red y Poder
# ==========================================================================
# Refined Storage, Create Enchantment Industry, Create Deco.
# Trains avanzados, Create C&A (electric motor, alternator).
# Large Rune Pouch. Soul/Lightning runes.
# Netherite jewelry (citrine/jade/ruby/sapphire/tanzanite/topaz variants).
# Llave Maestra de dungeon.
#
# NOTE: spell_power and ranged_weapon_api items are vanilla potions/arrows
# under minecraft: namespace. They CANNOT be gated by mod ID.
# Gating via brewing ingredient access (Nether materials) is sufficient.
# NOTE: spell_power ENCHANTS (spell_power:spell_power, sunfire, soulfrost, etc.)
# son gateados hasta Ch5 via KubeJS (Issue #89):
# modpack/kubejs/server_scripts/01_progression/enchantment_gating.js
# ==========================================================================

[stage]
id = "servo_ch5"
display_name = "Red y Poder"
description = "Refined Storage, Enchantment Industry, Netherite jewelry"
icon = "refinedstorage:controller"
unlock_message = "&d&lCapitulo 5 Desbloqueado! &r&7Red digital y poder magico disponibles."
dependency = "servo_ch4"

[locks]

# --- Whole mod locks ---
# Refined Storage (digital storage, autocrafting)
# Create Enchantment Industry (auto-enchanting)
# Create Deco (industrial decoration)
mods = [
    "refinedstorage",
    "create_enchantment_industry",
    "createdeco"
]

# --- Specific item locks ---
items = [
    # Create C&A advanced items (electric motor, alternator)
    "createaddition:electric_motor",
    "createaddition:alternator",
    "createaddition:tesla_coil",
    "createaddition:accumulator",
    "createaddition:portable_energy_interface",
    "createaddition:redstone_relay",

    # Dungeon key: Master (Tier 3)
    "servo_core:master_dungeon_key",

    # Runes: Large Rune Pouch + Soul/Lightning runes
    "runes:large_rune_pouch",
    "runes:soul_stone",
    "runes:lightning_stone",

    # Jewelry: Netherite tier (6 gem variants x ring+necklace = 12 items)
    # NOTE: No plain netherite_ring/necklace exists — only gem variants
    "jewelry:netherite_citrine_ring",
    "jewelry:netherite_citrine_necklace",
    "jewelry:netherite_jade_ring",
    "jewelry:netherite_jade_necklace",
    "jewelry:netherite_ruby_ring",
    "jewelry:netherite_ruby_necklace",
    "jewelry:netherite_sapphire_ring",
    "jewelry:netherite_sapphire_necklace",
    "jewelry:netherite_tanzanite_ring",
    "jewelry:netherite_tanzanite_necklace",
    "jewelry:netherite_topaz_ring",
    "jewelry:netherite_topaz_necklace"
]
