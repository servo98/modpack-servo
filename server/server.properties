# Modpack Servo — Development Server Properties
# Optimizado para testing rapido con RCON

# === RCON (Remote Console) ===
enable-rcon=true
rcon.port=25575
rcon.password=servo-dev
broadcast-rcon-to-ops=true

# === Server basics ===
server-port=25566
server-ip=
motd=Modpack Servo Dev Server
max-players=8
online-mode=false
white-list=false
enforce-whitelist=false
gamemode=creative
force-gamemode=false
difficulty=normal
level-name=test-world
level-type=minecraft\:normal
level-seed=servo-test-seed-42

# === Performance (dev) ===
view-distance=8
simulation-distance=6
max-tick-time=120000
network-compression-threshold=256
rate-limit=0

# === Dev-friendly ===
allow-flight=true
pvp=false
spawn-protection=0
enable-command-block=true
allow-nether=true
spawn-npcs=true
spawn-animals=true
spawn-monsters=true
generate-structures=true
max-world-size=5000

# === Logging ===
log-ips=false
